---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dyndns
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      main:
        type: cronjob
        cronjob:
          concurrencyPolicy: Forbid
          schedule: "1-56/5 * * * *"
        pod:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
        containers:
          main:
            image:
              repository: ghcr.io/haraldkoch/kubectl
              tag: 1.36.0@sha256:91d0a13909b2e85c8b3eea4e1c9f318bddff9e88427485a273ab713ed6286031
            command:
              - "/bin/bash"
              - "/app/dyndns.sh"
            envFrom:
              - secretRef:
                  name: *app
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    persistence:
      script:
        type: configMap
        name: *app
        defaultMode: 0775
        globalMounts:
          - path: /app/dyndns.sh
            subPath: dyndns.sh
            readOnly: true
      tmp:
        type: emptyDir
