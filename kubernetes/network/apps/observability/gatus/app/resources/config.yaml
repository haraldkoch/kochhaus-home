---
# Note: Gatus vars should be escaped with $${VAR_NAME} to avoid interpolation by Flux
alerting:
  pushover:
    title: Gatus (Kubernetes)
    application-token: $${PUSHOVER_TOKEN}
    user-key: $${PUSHOVER_USER_KEY}
    priority: 1
    default-alert:
      description: health-check failed
      send-on-resolved: true
      failure-threshold: 3
      success-threshold: 3

connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

endpoints:
  - name: Cloudflare
    group: connectivity
    url: icmp://1.1.1.1
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: pushover

  - name: Google
    group: connectivity
    url: icmp://8.8.8.8
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: pushover

  - name: Quad9
    group: connectivity
    url: icmp://9.9.9.9
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: pushover

  - name: status
    group: guarded
    url: 1.1.1.1
    interval: 1m
    dns:
      query-name: "status-network.${CLUSTER_DOMAIN}"
      query-type: A
    conditions:
      - "len([BODY]) == 0"
    alerts:
      - type: pushover

metrics: true

storage:
  type: sqlite
  caching: true
  path: $${GATUS_CONFIG_PATH}/gatus.db

ui:
  title: Status | Gatus (Network)
  header: Status
  logo: https://avatars.githubusercontent.com/u/7131938
  link: https://github.com/haraldkoch
  buttons:
    - name: Github
      link: https://github.com/haraldkoch
    - name: Homelab
      link: https://github.com/haraldkoch/kochhaus-home

web:
  port: $${GATUS_WEB_PORT}
