---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zigbee2mqtt
spec:
  components:
    - ../../../../components/gatus/guarded
    - ../../../../network/components/volsync
  dependsOn:
    - name: longhorn
      namespace: storage
    - name: volsync
      namespace: storage
  interval: 1h
  path: ./kubernetes/apps/base/default/zigbee2mqtt
  postBuild:
    substitute:
      APP: zigbee2mqtt
      GATUS_SUBDOMAIN: zigbee
      VOLSYNC_CAPACITY: 1Gi
      VOLSYNC_GID: "1022"
      VOLSYNC_UID: "1022"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
