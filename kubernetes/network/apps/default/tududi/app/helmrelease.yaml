---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tududi
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      tududi:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/tududi
              tag: 1.1.0@sha256:c79bb7330aa0a83f81ffe0cd3fe324293ffba449e7fd2e292c458365d8ff8a35
            env:
              BASE_URL: https://{{ .Release.Name }}.${CLUSTER_DOMAIN}
              TUDUDI_USER_EMAIL: admin@${CLUSTER_DOMAIN}
              TUDUDI_BASE_URL: https://{{ .Release.Name }}.${CLUSTER_DOMAIN}
              TUDUDI_TRUST_PROXY: "true"
            envFrom:
              - secretRef:
                  name: tududi-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 3002
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: {type: RuntimeDefault}
    service:
      main:
        ports:
          http:
            port: &port 3002
    route:
      main:
        hostnames:
          - "{{ .Release.Name }}.${CLUSTER_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: main
                port: *port
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
