---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky-ui
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      blocky-ui:
        strategy: RollingUpdate
        containers:
          castor:
            image:
              repository: ghcr.io/gabeduartem/blocky-ui
              tag: 1.6.1@sha256:35e67a68a6ef15ad43d3b9913ab7e667deaddcb022e414eacc8070a1450b4441
            env:
              # QUERY_LOG_TYPE: postgresql
              # QUERY_LOG_TARGET:
              #   secretKeyRef:
              #     name: blocky-db-app
              #     key: uri
              BLOCKY_API_URL: http://blocky1.${PRIVATE_STATIC_DOMAIN}:4000
            probes:
              liveness:
                enabled: true
                type: HTTP
              readiness:
                enabled: true
                type: HTTP
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: {type: RuntimeDefault}
    service:
      castor:
        ports:
          http:
            port: &port 3000
    route:
      castor:
        hostnames:
          - blocky1.${CLUSTER_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: castor
                port: *port
