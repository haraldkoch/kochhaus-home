---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: node-red
spec:
  components:
    - ../../../../components/gatus/guarded
    - ../../../../network/components/volsync
  dependsOn:
    - name: longhorn
      namespace: storage
    - name: volsync
      namespace: storage
  interval: 1h
  path: ./kubernetes/apps/base/default/node-red
  postBuild:
    substitute:
      APP: node-red
      VOLSYNC_CAPACITY: 1Gi
      VOLSYNC_CLAIM: node-red-config-v2
      VOLSYNC_GID: "1000"
      VOLSYNC_UID: "1000"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false
