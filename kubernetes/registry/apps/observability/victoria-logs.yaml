---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-logs-collector
spec:
  interval: 1h
  path: ./kubernetes/apps/base/observability/victoria-logs/collector
  postBuild:
    substitute:
      VICTORIA_LOGS_URL: https://victoria-logs.${CLUSTER_DOMAIN}
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
