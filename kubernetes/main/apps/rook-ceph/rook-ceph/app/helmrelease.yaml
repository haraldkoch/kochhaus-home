---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph
  interval: 1h
  values:
    csi:
      serviceMonitor:
        enabled: true
    deleteUnusedCrushRules: false
    enableDiscoveryDaemon: true
    image:
      repository: ghcr.io/rook/ceph
    cephCommandsTimeoutSeconds: "20"
    monitoring:
      enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 224Mi
      limits:
        cpu: 500m
        memory: 480Mi
