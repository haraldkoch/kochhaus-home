---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nextcloud
spec:
  components:
    - ../../../../components/dragonfly
    - ../../../../components/gatus/external
    - ../../../../components/keda/nfs-scaler
    - ../../../../main/components/volsync
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: dbms
    - name: dragonfly
      namespace: dbms
    - name: keda
      namespace: observability
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: storage
  interval: 1h
  healthCheckExprs:
    - apiVersion: dragonflydb.io/v1alpha1
      kind: Dragonfly
      failed: status.phase != 'ready'
      current: status.phase == 'ready'
  path: ./kubernetes/apps/base/default/nextcloud
  postBuild:
    substitute:
      APP: nextcloud
      GATUS_SUBDOMAIN: cloud
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_CLAIM: nextcloud-config-v3
      VOLSYNC_GID: "0"
      VOLSYNC_UID: "0"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 15m
  wait: false
