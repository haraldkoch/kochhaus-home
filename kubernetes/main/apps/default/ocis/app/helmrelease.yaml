---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ocis
spec:
  chartRef:
    kind: OCIRepository
    name: ocis
  interval: 1h
  values:
    controllers:
      ocis:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
              repository: mirror.gcr.io/owncloud/ocis
              tag: 8.0.1
            command:
              - /bin/sh
              - -c
            args:
              - |
                if [ ! -f /etc/ocis/ocis.yaml ]; then ocis init; else exit 0; fi
            env:
              OCIS_INSECURE: true
        containers:
          ocis:
            image:
              repository: mirror.gcr.io/owncloud/ocis
              tag: 8.0.1
            env:
              DEMO_USERS: false
              SETTINGS_SETUP_DEFAULT_ASSIGNMENTS: false
              NOTIFICATIONS_SMTP_HOST: smtp.${CLUSTER_DOMAIN}
              NOTIFICATIONS_SMTP_INSECURE: true
              NOTIFICATIONS_SMTP_PORT: "25"
              NOTIFICATIONS_SMTP_SENDER: "ocis@${CLUSTER_DOMAIN:=fnord}"
              OCIS_EXCLUDE_RUN_SERVICES: "idp,idm"
              IDM_CREATE_DEMO_USERS: false
              OCIS_ENABLE_OCM: false
              OCIS_INSECURE: true
              OCIS_LOG_COLOR: true
              OCIS_LOG_LEVEL: info
              OCIS_LOG_PRETTY: true
              OCIS_URL: https://files.${CLUSTER_DOMAIN}
              PROXY_CSP_CONFIG_FILE_LOCATION: /etc/ocis/csp.yaml
              PROXY_DEBUG_ADDR: 0.0.0.0:9205
              PROXY_HTTP_ADDR: 0.0.0.0:9200
              PROXY_TLS: false
              STORAGE_USERS_OCIS_ROOT: /data
              TZ: ${TIMEZONE}
              # Authelia OIDC
              # Auto role assignment:
              # docs: https://doc.owncloud.com/ocis/next/deployment/services/s-list/proxy.html#automatic-role-assignments
              OCIS_OIDC_ISSUER: https://auth.${CLUSTER_DOMAIN}
              PROXY_OIDC_ISSUER: https://auth.${CLUSTER_DOMAIN}
              # disable autoprovision for LLDAP?
              PROXY_AUTOPROVISION_ACCOUNTS: false
              #PROXY_AUTOPROVISION_CLAIM_USERNAME: preferred_username
              #PROXY_AUTOPROVISION_CLAIM_EMAIL: email
              #PROXY_AUTOPROVISION_CLAIM_DISPLAYNAME: name
              #PROXY_AUTOPROVISION_CLAIM_GROUPS: groups
              PROXY_OIDC_ACCESS_TOKEN_VERIFY_METHOD: none
              PROXY_OIDC_REWRITE_WELLKNOWN: true
              PROXY_OIDC_SKIP_USER_INFO: false
              PROXY_ROLE_ASSIGNMENT_DRIVER: oidc
              PROXY_ROLE_ASSIGNMENT_OIDC_CLAIM: groups
              PROXY_USER_OIDC_CLAIM: "preferred_username"
              WEB_OIDC_CLIENT_ID: ocis
              WEB_OIDC_METADATA_URL: https://auth.${CLUSTER_DOMAIN}/.well-known/openid-configuration
              WEB_OIDC_SCOPE: "openid profile email groups"
              # built-in idm (ldap) does not rotate certificates. Grrr.
              OCIS_LDAP_URI: ldap://lldap.security:389
              OCIS_LDAP_INSECURE: "true"
              OCIS_LDAP_BIND_DN: "uid=opencloud_bind,ou=people,dc=home,dc=arpa"
              OCIS_LDAP_USER_ENABLED_ATTRIBUTE: uid
              GRAPH_ASSIGN_DEFAULT_USER_ROLE: false
              GRAPH_LDAP_SERVER_WRITE_ENABLED: false
              GRAPH_LDAP_REFINT_ENABLED: false
              GRAPH_USERNAME_MATCH: none
              OCIS_LDAP_GROUP_BASE_DN: "ou=groups,dc=home,dc=arpa"
              OCIS_LDAP_GROUP_OBJECTCLASS: "groupOfUniqueNames"
              OCIS_LDAP_GROUPFILTER: "(objectclass=groupOfUniqueNames)"
              OCIS_LDAP_USER_BASE_DN: "ou=people,dc=home,dc=arpa"
              OCIS_LDAP_USER_OBJECTCLASS: "inetOrgPerson"
              LDAP_LOGIN_ATTRIBUTES: "uid"
              IDP_LDAP_LOGIN_ATTRIBUTE: "uid"
              IDP_LDAP_UUID_ATTRIBUTE: "entryuuid"
              OCIS_LDAP_USER_SCHEMA_ID: "entryuuid"
              OCIS_LDAP_GROUP_SCHEMA_ID: "uid"
              OCIS_LDAP_GROUP_SCHEMA_GROUPNAME: "uid"
              OCIS_LDAP_ADMIN_USER_ID: "6792d1e4-2bde-3b50-884e-fe5546b22469"
            envFrom:
              - secretRef:
                  name: ocis-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 9200
            primary: true
          metrics:
            port: 9205
    serviceMonitor:
      app:
        endpoints:
          - port: metrics
    route:
      app:
        hostnames:
          - "files.${CLUSTER_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      storage-users:
        type: nfs
        server: &nfsServer ${SECRET_BACKUP_SERVER:=fnord}
        path: &nfsPath /backup/data/k8s/ocis
        globalMounts:
          - path: /data
            subPath: storage-users
      data:
        type: nfs
        server: *nfsServer
        path: *nfsPath
        globalMounts:
          - path: /etc/ocis
            subPath: config
          - path: /var/lib/ocis
            subPath: data
      config:
        type: configMap
        name: ocis-configmap
        globalMounts:
          - path: /etc/ocis/proxy.yaml
            subPath: proxy.yaml
            readOnly: true
          - path: /etc/ocis/csp.yaml
            subPath: csp.yaml
            readOnly: true
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
