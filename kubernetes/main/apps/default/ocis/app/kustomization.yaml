---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml
configMapGenerator:
  - name: ocis-configmap
    files:
      - csp.yaml=./resources/csp.yaml
      - proxy.yaml=./resources/proxy.yaml
generatorOptions:
  disableNameSuffixHash: true
