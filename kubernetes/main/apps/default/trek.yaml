---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: trek
spec:
  components:
    - ../../../../components/gatus/internal
    - ../../../../main/components/volsync
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: storage
  interval: 1h
  path: ./kubernetes/apps/base/default/trek
  postBuild:
    substitute:
      APP: trek
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_CLAIM: trek-data
      VOLSYNC_GID: "65532"
      VOLSYNC_UID: "65532"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false
