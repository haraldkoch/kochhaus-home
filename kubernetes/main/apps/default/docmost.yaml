---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: docmost
spec:
  components:
    - ../../../../components/dragonfly
    - ../../../../components/gatus/guarded
    - ../../../../main/components/volsync
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: dbms
    - name: dragonfly
      namespace: dbms
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: storage
  healthCheckExprs:
    - apiVersion: dragonflydb.io/v1alpha1
      kind: Dragonfly
      failed: status.phase != 'ready'
      current: status.phase == 'ready'
  interval: 1h
  path: ./kubernetes/apps/base/default/docmost
  postBuild:
    substitute:
      APP: docmost
      GATUS_SUBDOMAIN: notes
      VOLSYNC_CAPACITY: 1Gi
      VOLSYNC_CLAIM: docmost
      VOLSYNC_GID: "568"
      VOLSYNC_UID: "568"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
