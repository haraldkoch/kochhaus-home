apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup-trigger
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          volumes:
          - name: workspace
            emptyDir: {}
          containers:
          - name: trigger
            image: mirror.gcr.io/alpine/httpie:3.2.4@sha256:1f75b1fd810e773c3c97833e373e20aa378159a265ceefb539abc7a6a06463c7
            command:
              - /bin/sh
              - -c
            args:
              - /usr/local/bin/http --ignore-stdin $SINK_URL trigger-template=cleanup params[target][namespace]=$NAMESPACE params[cleanup][keep]=$CLEANUP_KEEP
            volumeMounts:
            - mountPath: /workspace
              name: workspace
            env:
              - name: SINK_URL
                value: "http://el-tekton-cleaner.tekton-system.svc.cluster.local:8080"
              - name: NAMESPACE
                value: "tekton-system"
              - name: CLEANUP_KEEP
                value: "3"
          restartPolicy: Never
