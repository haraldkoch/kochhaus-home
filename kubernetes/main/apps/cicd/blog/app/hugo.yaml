---
# yaml-language-server: $schema=https://raw.githubusercontent.com/redhat-developer/vscode-tekton/refs/heads/main/scheme/tekton.dev/v1_Task.json
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: hugo
spec:
  params:
    - name: publish
      type: string
  steps:
    - name: clone
      image: ghcr.io/haraldkoch/ubuntu:rolling@sha256:0cadbba24ea3ca670dc803ada84da4f4b9c25d3208dceacff8c409a4fa752834
      script: |
        #!/bin/sh

        cd /workspace
        git clone --recurse-submodules $${GIT_REPOSITORY} blog
      env:
        - name: GIT_REPOSITORY
          valueFrom:
            secretKeyRef:
              name: blog-secret
              key: repository
      volumeMounts:
        - name: blog-ssh-secret
          mountPath: /etc/ssh/ssh_known_hosts
          subPath: ssh_known_hosts
        - name: ssh
          mountPath: /home/ubuntu/.ssh
        - name: blog-ssh-secret
          mountPath: /home/ubuntu/.ssh/id_ed25519
          subPath: id_ed25519
          readOnly: true

    - name: build
      image: hugomods/hugo:non-root-0.157.0
      script: |-
        #!/bin/sh

        mkdir /workspace/public
        cd /workspace/blog
        hugo build --cleanDestinationDir --destination /workspace/public

    - name: publish
      when:
        - input: "$(params.publish)"
          operator: in
          values:
            - "true"
      image: ghcr.io/haraldkoch/rsync:3.4.3@sha256:317572f091e38efd15d001018c1ff13b267df17f04f9e91950e087117d6f19fc
      script: |-
        #!/bin/sh

        rsync --delete -rlpt -i --partial /workspace/public/ $${RSYNC_DEST}
      env:
        - name: RSYNC_DEST
          valueFrom:
            secretKeyRef:
              name: blog-secret
              key: rsync_dest
      volumeMounts:
        - name: blog-ssh-secret
          mountPath: /etc/ssh/ssh_known_hosts
          subPath: ssh_known_hosts
        # - name: blog-ssh-secret
        #   mountPath: /etc/ssh/ssh_config
        #   subPath: ssh_config
        #   readOnly: true
        - name: ssh
          mountPath: /home/rsync/.ssh
        - name: blog-ssh-secret
          mountPath: /home/rsync/.ssh/id_ed25519
          subPath: id_ed25519
          readOnly: true

  workspaces:
    - name: workspace
      description: The main workspace
      mountPath: /workspace

  volumes:
    - name: blog-ssh-secret
      secret:
        secretName: blog-ssh-secret
        defaultMode: 0600
    - name: ssh
      emptyDir:
        medium: Memory
