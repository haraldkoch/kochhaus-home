---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-trigger-build-weblog
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-trigger-build-weblog-eventlistener
subjects:
  - kind: ServiceAccount
    name: tekton-trigger-build-weblog
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-roles
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-trigger-build-weblog-eventlistener
subjects:
  - kind: ServiceAccount
    name: tekton-trigger-build-weblog
    namespace: cicd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-clusterroles
