---
apiVersion: batch/v1
kind: Job
metadata:
  name: tekton-results-db-job
spec:
  backoffLimit: 4
  template:
    spec:
      containers:
      - envFrom:
          - secretRef:
              name: tekton-results-postgres
        image: ghcr.io/haraldkoch/postgres-init:18.4@sha256:03f896d1a277358d5c4e34e5b07e9a3e13b48ffa65ee9f6c5e64568e6e077ce4
        name: init-db
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 65534
          runAsNonRoot: true
          runAsUser: 65534
          seccompProfile:
            type: RuntimeDefault
      restartPolicy: OnFailure
