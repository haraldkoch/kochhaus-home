---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pgadmin
spec:
  components:
    - ../../../../components/gatus/guarded
    - ../../../../main/components/volsync
  dependsOn:
    - name: cloudnative-pg-cluster
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: storage
  interval: 1h
  path: ./kubernetes/apps/base/dbms/pgadmin
  postBuild:
    substitute:
      APP: pgadmin
      VOLSYNC_CAPACITY: 100Mi
      VOLSYNC_CLAIM: pgadmin-config-v1
      VOLSYNC_GID: "5050"
      VOLSYNC_UID: "5050"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
