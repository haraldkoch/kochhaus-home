  - ./cilium/ks.yaml
  - ./coredns.yaml
  - ./descheduler.yaml
  - ./etcd-defrag.yaml
  - ./generic-device-plugin.yaml
  - ./intel-gpu-resource-driver.yaml
  - ./metrics-server.yaml
  - ./reloader.yaml
