---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tplink-plug-exporter
spec:
  interval: 1h
  path: ./kubernetes/apps/base/observability/tplink-plug-exporter
  postBuild:
    substitute:
      SUBDOMAIN: exporters-${CLUSTER}
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
