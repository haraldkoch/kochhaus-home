---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-stack
spec:
  components:
    - ../../../../components/gatus/guarded
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/base/observability/kube-prometheus-stack
  postBuild:
    substitute:
      CLUSTER: ${CLUSTER}
      APP: kube-prometheus-stack
      GATUS_SUBDOMAIN: prometheus-main
      ALERTMANAGER_SUBDOMAIN: alertmanager-main
      ALERTMANAGER_PEER: amcluster-network
      PROMETHEUS_SUBDOMAIN: prometheus-main
      STORAGECLASS: ceph-block
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
