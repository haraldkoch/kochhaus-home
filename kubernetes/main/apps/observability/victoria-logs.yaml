# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-logs-collector
spec:
  dependsOn:
    - name: victoria-logs
  interval: 1h
  path: ./kubernetes/apps/base/observability/victoria-logs/collector
  postBuild:
    substitute:
      VICTORIA_LOGS_URL: http://victoria-logs-server.observability.svc.cluster.local:9428
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
