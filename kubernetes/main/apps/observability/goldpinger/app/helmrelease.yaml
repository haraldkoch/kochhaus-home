---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldpinger
spec:
  chart:
    spec:
      chart: goldpinger
      version: 6.2.0
      sourceRef:
        kind: HelmRepository
        name: okgolove
  interval: 1h
  values:
    image:
      repository: mirror.gcr.io/bloomberg/goldpinger
      tag: 3.11.2@sha256:a1fb87c2e9d985b227f4a1d67996b4637e0c23068051bbd8cc7e98d55349f70c
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
    service:
      type: ClusterIP
      port: 80
      ipFamilyPolicy: PreferDualStack
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 15m
        memory: 64M
      limits:
        memory: 64M
    serviceMonitor:
      enabled: true
    prometheusRule:
      enabled: true
