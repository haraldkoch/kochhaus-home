---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: docmost
spec:
  chartRef:
    kind: OCIRepository
    name: docmost
  interval: 1h
  values:
    controllers:
      docmost:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/haraldkoch/postgres-init
              tag: 18.4@sha256:2afd59dcc153c6ff909a20bb0f76a97dae8973c0d4061b96087254bb30a5fcce
            envFrom: &envFrom
              - secretRef:
                  name: docmost-secret
        containers:
          app:
            image:
              repository: mirror.gcr.io/docmost/docmost
              tag: 0.80.2
            env:
              TZ: "${TIMEZONE:=Etc/UTC}"
              APP_URL: "https://{{ .Release.Name }}.${CLUSTER_DOMAIN}"
              MAIL_DRIVER: smtp
              MAIL_FROM_ADDRESS: docmost@${CLUSTER_DOMAIN}
              MAIL_FROM_NAME: Docmost
              PORT: "3000"
              REDIS_URL: "redis://dragonfly.dbms:6379"
              SMTP_HOST: smtp.${CLUSTER_DOMAIN}
              SMTP_PORT: 25
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 25m
                memory: 105M
              limits:
                memory: 512M
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ipFamilyPolicy: SingleStack
        ports:
          http:
            port: 3000
    route:
      app:
        hostnames:
          - "notes.${CLUSTER_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: ${VOLSYNC_CLAIM}
        globalMounts:
          - path: /app/data/storage
