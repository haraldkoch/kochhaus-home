---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  timeout: 15m
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: nextcloud
  values:
    global:
      image:
        registry: mirror.gcr.io
    cronjob:
      enabled: true
      type: cronjob
      cronjob:
        affinity:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - nextcloud
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - app
                topologyKey: kubernetes.io/hostname
        successfulJobsHistoryLimit: 1
    image:
      flavor: fpm-alpine
    nginx:
      enabled: true
      image:
        repository: mirror.gcr.io/library/nginx
    nextcloud:
      extraInitContainers:
        - name: init-db
          image: ghcr.io/haraldkoch/postgres-init:18.4@sha256:2afd59dcc153c6ff909a20bb0f76a97dae8973c0d4061b96087254bb30a5fcce
          envFrom:
            - secretRef:
                name: nextcloud-secret
      datadir: /var/www/data
      extraEnv:
        - name: REDIS_HOST
          value: nextcloud-dragonfly-db.default.svc.cluster.local.
        - name: REDIS_HOST_PORT
          value: "6379"
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
      host: &host cloud.${CLUSTER_DOMAIN}
      mail:
        enabled: true
        fromAddress: admin
        domain: ${CLUSTER_DOMAIN}
        smtp:
          host: smtp.${CLUSTER_DOMAIN}
          port: 25
          authtype: NONE
          name: ""
          password: ""
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array (
            'check_data_directory_permissions' => false,
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
            'skeletondirectory' => '',
            'trusted_proxies' => array(
              0 => '127.0.0.1',
              1 => '${NETWORK_K8S_POD_CIDR}',
              2 => '${NETWORK_K8S_POD_CIDR_V6}',
            ),
          ); ?>
        misc.config.php: |-
          <?php
          $CONFIG = array (
            'default_phone_region' => 'CA',
            'maintenance_window_start' => 2,
          ); ?>
    internalDatabase:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      host: postgres-rw.dbms.svc.cluster.local.
      database: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        usernameKey: INIT_POSTGRES_USER
        passwordKey: INIT_POSTGRES_PASS
    httpRoute:
      enabled: true
      hostnames:
        - *host
      parentRefs:
        - name: envoy-external
          namespace: network
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: "/"
          filters:
            - type: ResponseHeaderModifier
              responseHeaderModifier:
                add:
                  - name: strict-transport-security
                    value: max-age=31536000
    persistence:
      enabled: true
      existingClaim: ${VOLSYNC_CLAIM}
    # this seems to be required for nextcloud initialization which takes a long time
    startupProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 30
      successThreshold: 1
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: nextcloud
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: nextcloud
              spec:
                template:
                  spec:
                    hostUsers: false
