---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bookboss
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: bookboss-secret
    template:
      data:
        BOOKBOSS__ENCRYPTION_SECRET: "{{ .bookboss_encryption_secret }}"
        BOOKBOSS__METADATA__HARDCOVER_API_TOKEN: "{{ .hardcover_api_token }}"
  dataFrom:
    - extract:
        key: bookboss
      rewrite:
        - regexp:
            source: "(.*)"
            target: "bookboss_$1"
    - extract:
        key: hardcover
      rewrite:
        - regexp:
            source: "(.*)"
            target: "hardcover_$1"
