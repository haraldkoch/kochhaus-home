---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: tplink-plug-exporter
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  envs:
    - name: VAR_BLOCKY_URL
      value: 'http:\/\/192.168.22.53:4000'
  folder: home
  url: https://grafana.com/api/dashboards/13768/revisions/8/download
