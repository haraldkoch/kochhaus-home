---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app smartctl-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: smartctl-exporter
  interval: 1h
  values:
    fullnameOverride: *app
    image:
      repository: ghcr.io/haraldkoch/smartctl_exporter
      tag: 0.14.0@sha256:a35acd3782e239298d28ddf8963b1e215ce70a13f17e68ece9f2878d6f72781a
    config:
      devices:
        - /dev/sda
        - /dev/nvme0n1
    # we also monitor from heimdall
    hostNetwork: true
    serviceMonitor:
      enabled: true
      relabelings:
        - action: labeldrop
          regex: (pod)
    prometheusRules:
      enabled: false
