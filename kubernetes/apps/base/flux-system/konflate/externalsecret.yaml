---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: konflate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: konflate
    template:
      data:
        KONFLATE_WEBHOOK_SECRET: "{{ .konflate_webhook_secret }}"
        KONFLATE_APP_CLIENT_ID: "{{ .BOT_CLIENT_ID }}"
        KONFLATE_APP_PRIVATE_KEY: "{{ .BOT_APP_PRIVATE_KEY }}"
  dataFrom:
    - extract:
        key: konflate
      rewrite:
        - regexp:
            source: "[^a-zA-Z0-9-]"
            target: "_"
        - regexp:
            source: "(.*)"
            target: "konflate_$1"
    - extract:
        key: github-bot
