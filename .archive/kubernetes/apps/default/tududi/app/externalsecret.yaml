---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tududi
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: tududi-secret
    template:
      data:
        TUDUDI_USER_PASSWORD: "{{ .admin_password }}"
        TUDUDI_SESSION_SECRET: "{{ .session_secret }}"
        CALDAV_ENABLED: "true"
        ENCRYPTION_KEY: "{{ .encryption_key }}"
        OIDC_ENABLED: "true"
        OIDC_PROVIDER_NAME: "Authelia"
        OIDC_PROVIDER_SLUG: "authelia"
        OIDC_ISSUER_URL: "https://auth.${CLUSTER_DOMAIN}"
        OIDC_CLIENT_ID: "tududi"
        OIDC_CLIENT_SECRET: "{{ .oidc_client_secret }}"
        OIDC_SCOPE: "openid profile email"
        # Note: auto provisioning is currently failing with an "Email claim is
        # required for provisioning" error, even though I have one.
        OIDC_AUTO_PROVISION: "false"
  dataFrom:
    - extract:
        key: tududi
